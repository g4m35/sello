id: paid-beta-p0-readiness
title: Complete bulk-intake and paid-beta P0 production readiness
status: active
owner: codex
reviewer: independent-review-required
risk: critical
task_type: backend
base_branch: develop
working_branch: develop-v1
worktree_path: $CONDUCTOR_WORKSPACE_PATH
created_at: 2026-07-11T00:20:00.000Z
goal: Make bulk intake, usage enforcement, entitlement decisions, worker recovery, and eBay sold reconciliation production-ready without performing a deployment or shared-database mutation.
context: The durable bulk-intake foundation is present on origin/develop. Its migration is pending on the configured shared target, whose migration ledger also contains an unknown migration absent from Git. Paid-beta readiness documentation identifies atomic usage, unified entitlements, retry-safe workers, and eBay sold reconciliation as P0 blockers.
non_goals:
  - Perform paid-provider calls or live marketplace writes.
  - Perform destructive database actions or bypass migration provenance checks.
allowed_paths:
  - .agent/tasks/**
  - .agent/state/**
  - .conductor/settings.toml
  - scripts/agent-workflow/**
  - prisma/**
  - src/app/api/**
  - src/lib/ai/**
  - src/lib/auth/**
  - src/lib/billing/**
  - src/lib/bulk-intake/**
  - src/lib/comps/**
  - src/lib/inventory/**
  - src/lib/inventory-sync/**
  - src/lib/marketplace/**
  - src/lib/queues/**
  - docs/**
protected_paths:
  - .env*
  - .github/**
  - scripts/conductor/**
  - scripts/stripe/**
required_reading:
  - AGENTS.md
  - prisma/AGENTS.md
  - src/lib/auth/AGENTS.md
  - src/lib/billing/AGENTS.md
  - src/lib/comps/AGENTS.md
  - src/lib/marketplace/AGENTS.md
  - src/lib/inventory-sync/AGENTS.md
  - docs/architecture/invariants.md
  - docs/PAID_BETA_IMPLEMENTATION_PLAN_2026-07-09.md
acceptance:
  - Bulk-intake ownership, ordering, idempotency, cancellation, conversion, RLS, and rollout safety defects are corrected with forward-only migration handling.
  - Usage limits use atomic account-scoped reservations with durable idempotent settlement or release and provider-budget protection.
  - One fail-closed server-side entitlement decision layer returns stable reason codes and seller-safe copy.
  - Relevant database workers use bounded retry, leases, stale recovery, idempotency, cancellation, sanitized errors, and review escalation.
  - eBay confirmed sold signals atomically mark canonical inventory sold and queue other-channel delists; ambiguous signals create review evidence.
  - Focused concurrency, isolation, failure, retry, rollover, and no-external-call tests pass.
  - Authoritative rollout, smoke-test, rollback, and recovery documentation is updated.
  - Full repository validation passes or any base failure is independently reproduced and documented.
validation:
  - npm test -- --run prisma/migrations src/lib/bulk-intake src/lib/billing src/lib/auth src/lib/comps src/lib/inventory src/lib/inventory-sync
  - npm run prisma:validate
  - npm run validate:full
full_validation_required: true
documentation:
  - docs/architecture/bulk-intake-paid-beta-readiness.md
  - docs/operations/paid-beta-production-rollout.md
review_requirements:
  - Independent review must focus on migration ledger safety, cross-account constraints, quota oversubscription, admin and kill-switch precedence, retry/idempotency behavior, uncertain external outcomes, sold-state races, sanitization, and absence of live side effects.
deployment_authorized: true
merge_authorized: true
notes: Do not edit the existing bulk migration because deployment state outside the configured shared target is not fully provable. Add only forward-safe follow-up migrations. The configured target reports an unknown 20260709000000_enable_app_table_rls migration absent from Git; rollout is blocked until its SQL and checksum are recovered and verified.
validation_notes:
  - Conductor placeholder branches such as develop-v1 are accepted when worktree_path is $CONDUCTOR_WORKSPACE_PATH and the check runs inside the matching registered Conductor workspace. Future Conductor branches use the configured feature/ prefix.
